<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - Code Ge'ez</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={theme:{extend:{colors:{primary:"#3525cd","surface-container-lowest":"#ffffff","surface":"#fcf8ff","on-surface-variant":"#464555","surface-container-low":"#f5f2ff","surface-container":"#f0ecf9"},fontFamily:{"label-caps":["Inter"],"body-md":["Inter"],"mono-data":["ui-monospace"],"h1":["Manrope"],"h3":["Manrope"]}}}}</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle;}
    .shadow-diffused { box-shadow: 0 20px 50px -12px rgba(53, 37, 205, 0.08); }
    .pw-hidden { -webkit-text-security: disc; text-security: disc; letter-spacing: 0.2em; font-family: monospace; }
    .pw-visible { -webkit-text-security: none; text-security: none; font-family: monospace; }
</style>
<script>
    function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => { const btn = document.activeElement; if (btn && btn.tagName === 'BUTTON') { const icon = btn.querySelector('.material-symbols-outlined'); if (icon) { const old = icon.textContent; icon.textContent = 'check'; setTimeout(() => { icon.textContent = old; }, 2000); } } }); }
    function togglePassword(btn) { const span = btn.previousElementSibling; if (span.classList.contains('pw-hidden')) { span.classList.remove('pw-hidden'); span.classList.add('pw-visible'); btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">visibility_off</span>'; } else { span.classList.remove('pw-visible'); span.classList.add('pw-hidden'); btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">visibility</span>'; } }
</script>
</head>
<body class="bg-surface text-[#1b1b24] font-body-md min-h-screen pt-16 flex flex-col">
<nav class="fixed top-0 w-full z-50 border-b border-slate-200/50 bg-white/80 backdrop-blur-xl shadow-sm">
    <div class="flex items-center justify-between px-6 h-16 max-w-full mx-auto">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary" data-icon="key">key</span>
            <span class="text-xl font-bold tracking-tighter font-h1">Code Ge'ez</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/vault/add" class="flex items-center gap-2 px-4 py-2 bg-[#e4d4ff] text-[#5c00ca] rounded-full font-label-caps text-xs font-bold uppercase transition-all hover:bg-[#7531e6] hover:text-white"><span class="material-symbols-outlined text-[18px]">add_circle</span> Add Entry</a>
            <div class="h-6 w-px bg-slate-200 mx-1"></div>
            <a href="/logout" class="p-2 text-on-surface-variant hover:bg-slate-100 rounded-full transition-colors duration-300"><span class="material-symbols-outlined">logout</span></a>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-6 py-8 flex-grow w-full">
    <header class="mb-8 flex justify-end">
        <form method="GET" action="/vault" class="relative w-full max-w-md group">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-[#777587]">search</span>
            <input name="q" class="w-full pl-12 pr-16 py-4 bg-surface-container border-none rounded-xl font-body-md focus:ring-2 focus:ring-primary/20 focus:bg-white shadow-diffused transition-all outline-none" placeholder="Search your vault..." type="text"/>
            <a href="/vault" class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-bold text-[#777587] hover:text-[#1b1b24] uppercase">Clear</a>
        </form>
    </header>

    <div id="msg-box" class="hidden mb-4 bg-green-50 text-green-700 p-4 rounded-xl border border-green-200 text-sm font-semibold">{{MESSAGE}}</div>
    <script>
        const msg = document.getElementById('msg-box');
        const content = msg.innerHTML.trim();
        if(content !== '' && content !== '{{MESSAGE}}') { msg.classList.remove('hidden'); }
    </script>

    <div class="bg-white rounded-xl shadow-diffused overflow-hidden border border-slate-200">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-[#fcf8ff]">
            <span class="font-label-caps text-xs font-bold text-[#777587] uppercase tracking-widest">SITE / USERNAME</span>
            <span class="font-label-caps text-xs font-bold text-[#777587] uppercase tracking-widest">PASSWORD / ACTIONS</span>
        </div>
        <!-- INJECTED C ROWS GO HERE -->
        {{VAULT_ENTRIES}}
    </div>
</main>

<!-- AES INFO FOOTER -->
<footer class="mt-auto py-8 text-center flex flex-col items-center justify-center gap-2 opacity-70 hover:opacity-100 transition-opacity">
    <div class="flex flex-wrap justify-center items-center gap-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">
        <span class="flex items-center gap-1"><span class="text-sm">🛡️</span> AES-256 Encrypted</span>
        <span class="hidden sm:inline">•</span>
        <span class="flex items-center gap-1"><span class="text-sm">🔒</span> Zero-Knowledge Arch</span>
        <span class="hidden sm:inline">•</span>
        <span class="flex items-center gap-1"><span class="text-sm">⚡</span> Local Processing</span>
    </div>
</footer>

</body></html>
