<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Code Ge'ez | Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#6366f1","primary-hover":"#4f46e5"},fontFamily:{"body-md":["Inter"],"h1":["Manrope"]}}}}</script>
<style>
    body { font-size: 0 !important; color: transparent !important; background-color: #020617; }
    #app-container { font-size: 16px !important; color: #f8fafc !important; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle;}
    .pw-hidden { -webkit-text-security: disc; text-security: disc; letter-spacing: 0.2em; font-family: monospace; }
    .pw-visible { -webkit-text-security: none; text-security: none; font-family: monospace; }
    #override-c-colors > div { background-color: transparent !important; border-color: rgba(255,255,255,0.05) !important; color: #f8fafc !important; }
    #override-c-colors .text-slate-900, #override-c-colors .text-slate-800, #override-c-colors .text-slate-700 { color: #f8fafc !important; }
    #override-c-colors .text-slate-500, #override-c-colors .text-slate-400 { color: #94a3b8 !important; }
    #override-c-colors .bg-slate-50, #override-c-colors .bg-slate-100 { background-color: rgba(30, 41, 59, 0.5) !important; }
    #override-c-colors .border-slate-100, #override-c-colors .border-slate-200 { border-color: rgba(255,255,255,0.05) !important; }
    #override-c-colors .hover\:bg-slate-50:hover { background-color: rgba(255, 255, 255, 0.03) !important; }
</style>
<script>
    function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => { const btn = document.activeElement; if (btn && btn.tagName === 'BUTTON') { const icon = btn.querySelector('.material-symbols-outlined'); if (icon) { const old = icon.textContent; icon.textContent = 'check'; setTimeout(() => { icon.textContent = old; }, 2000); } } }); }
    function togglePassword(btn) { const span = btn.previousElementSibling; if (span.classList.contains('pw-hidden')) { span.classList.remove('pw-hidden'); span.classList.add('pw-visible'); btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">visibility_off</span>'; } else { span.classList.remove('pw-visible'); span.classList.add('pw-hidden'); btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">visibility</span>'; } }
    
    async function auditVault() {
        const btn = document.getElementById('audit-btn');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span> Auditing...';
        btn.disabled = true;

        const pwSpans = document.querySelectorAll('.pw-hidden, .pw-visible');
        let breachedCount = 0;

        for (let span of pwSpans) {
            const pw = span.textContent;
            if (!pw || pw === 'ERROR') continue;

            const msgBuffer = new TextEncoder().encode(pw);
            const hashBuffer = await crypto.subtle.digest('SHA-1', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();

            const prefix = hashHex.substring(0, 5);
            const suffix = hashHex.substring(5);

            try {
                const res = await fetch(`https://api.pwnedpasswords.com/range/${prefix}`);
                const text = await res.text();
                
                const parent = span.parentNode;
                const oldBadge = parent.querySelector('.breach-badge');
                if(oldBadge) oldBadge.remove();

                if (text.includes(suffix)) {
                    breachedCount++;
                    span.classList.add('text-red-400');
                    const warningHtml = `<span class="breach-badge ml-3 inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-bold bg-red-500/20 text-red-400 border border-red-500/30 uppercase tracking-wider"><span class="material-symbols-outlined text-[12px]">warning</span> Compromised</span>`;
                    span.insertAdjacentHTML('afterend', warningHtml);
                } else {
                    span.classList.remove('text-red-400');
                    const safeHtml = `<span class="breach-badge ml-3 inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 uppercase tracking-wider"><span class="material-symbols-outlined text-[12px]">check_circle</span> Safe</span>`;
                    span.insertAdjacentHTML('afterend', safeHtml);
                }
            } catch(e) {
                console.error("Audit failed", e);
            }
        }

        btn.innerHTML = originalHtml;
        btn.disabled = false;
        
        if(breachedCount > 0) {
            const msgBox = document.getElementById('msg-box');
            msgBox.className = 'mb-6 bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-sm font-medium';
            msgBox.innerHTML = `<span class="material-symbols-outlined align-middle mr-1">warning</span> Audit Complete: ${breachedCount} compromised password(s) found! Update them immediately.`;
            msgBox.classList.remove('hidden');
        } else {
            const msgBox = document.getElementById('msg-box');
            msgBox.className = 'mb-6 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 p-4 rounded-xl text-sm font-medium';
            msgBox.innerHTML = `<span class="material-symbols-outlined align-middle mr-1">verified_user</span> Audit Complete: 0 compromised passwords found. Your vault is secure.`;
            msgBox.classList.remove('hidden');
        }
    }
</script>
</head>
<body class="bg-[#020617] min-h-screen relative font-body-md">
<div id="app-container" class="min-h-screen flex flex-col relative overflow-hidden">
    <nav class="fixed w-full top-0 border-b z-50 bg-[#020617]/80 backdrop-blur-md border-slate-800 flex justify-between items-center px-6 h-16">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">key</span>
            <span class="text-white font-h1 font-bold tracking-tight text-xl">Code Ge'ez</span>
        </div>
        <div class="flex items-center gap-4">
            <button id="audit-btn" onclick="auditVault()" class="hidden sm:flex items-center gap-2 px-4 py-2 bg-amber-500/10 text-amber-500 border border-amber-500/20 rounded-lg text-sm font-semibold hover:bg-amber-500 hover:text-white transition-all"><span class="material-symbols-outlined text-[18px]">policy</span> Run Audit</button>
            
            <a href="/vault/add" class="hidden sm:flex items-center gap-2 px-4 py-2 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded-lg text-sm font-semibold hover:bg-indigo-500 hover:text-white transition-all"><span class="material-symbols-outlined text-[18px]">add_circle</span> Add Entry</a>
            <div class="h-6 w-px bg-slate-700 mx-1"></div>
            <a href="/logout" class="p-2 text-slate-400 hover:text-white transition-colors"><span class="material-symbols-outlined">logout</span></a>
        </div>
    </nav>

    <main class="w-full max-w-5xl mx-auto px-6 pt-28 pb-12 flex-grow z-10">
        <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <form method="GET" action="/vault" class="relative w-full md:w-96 ml-auto group">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-500">search</span>
                <input name="q" class="w-full pl-12 pr-16 py-3.5 bg-slate-900/50 border border-slate-800 text-slate-200 rounded-xl focus:border-primary focus:ring-1 focus:ring-primary focus:bg-slate-900 transition-all outline-none" placeholder="Search your vault..." type="text"/>
                <a href="/vault" class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-500 hover:text-slate-300 uppercase">Clear</a>
            </form>
        </div>

        <div id="msg-box" class="hidden mb-6 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 p-4 rounded-xl text-sm font-medium">{{MESSAGE}}</div>
        <script>
            const msg = document.getElementById('msg-box'); const content = msg.innerHTML.trim();
            if(content !== '' && content !== '{{MESSAGE}}') { msg.classList.remove('hidden'); }
        </script>

        <div class="bg-slate-900/60 backdrop-blur-md border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
            <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Site / Username</span>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest text-right">Password / Actions</span>
            </div>
            <div id="override-c-colors" class="flex flex-col">
                {{VAULT_ENTRIES}}
            </div>
        </div>
    </main>

    <footer class="w-full py-6 text-center flex justify-center opacity-40 hover:opacity-100 transition-opacity z-50">
        <div class="flex flex-wrap justify-center items-center gap-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
            <span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[13px]">lock</span> AES-256 Encrypted</span>
            <span class="hidden sm:inline text-slate-700">•</span>
            <span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[13px]">security</span> k-Anonymity Audit</span>
            <span class="hidden sm:inline text-slate-700">•</span>
            <span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[13px]">vpn_key</span> Local Processing</span>
        </div>
    </footer>
</div>
</body></html>
