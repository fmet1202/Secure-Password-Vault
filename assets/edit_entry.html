<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SecureVault | Edit Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container": "#f0ecf9", "on-surface-variant": "#464555",
                    "surface-container-highest": "#e4e1ee", "surface-bright": "#fcf8ff",
                    "background": "#fcf8ff", "surface-container-high": "#eae6f4",
                    "primary-container": "#4f46e5", "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a", "on-error": "#ffffff", "on-background": "#1b1b24",
                    "primary": "#3525cd", "on-primary": "#ffffff", "surface": "#fcf8ff",
                    "outline-variant": "#c7c4d8", "outline": "#777587"
                },
                "fontFamily": {
                    "label-caps": ["Inter"], "body-md":["Inter"], "mono-data": ["ui-monospace"],
                    "h3": ["Manrope"], "h1": ["Manrope"], "h2": ["Manrope"]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
</style>
<script>
    function generatePassword() {
        fetch('/api/generate')
            .then(r => r.text())
            .then(t => {
                let lines = t.split('\n');
                let cleanPass = lines[lines.length - 1].trim();
                document.getElementById('site_pass').value = cleanPass;
                document.getElementById('site_pass').type = 'text'; 
            });
    }
</script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen pt-16">
<header class="fixed top-0 w-full z-50 border-b border-slate-200/50 bg-white/80 backdrop-blur-xl shadow-2xl shadow-slate-200/20">
    <div class="flex items-center justify-between px-6 h-16 max-w-full mx-auto">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-indigo-600">lock</span>
            <span class="text-xl font-bold tracking-tighter text-slate-900 font-h1">SecureVault</span>
        </div>
        <a href="/vault" class="font-manrope font-semibold text-slate-500 hover:bg-slate-100 px-4 py-2 rounded-lg transition-colors">Cancel</a>
    </div>
</header>
<main class="pt-8 pb-24 px-6 max-w-[800px] mx-auto min-h-screen">
    <div class="mb-8">
        {{MESSAGE}}
        <h1 class="font-h1 text-4xl font-bold text-on-surface mb-2">Edit Credential</h1>
        <p class="text-body-lg text-on-surface-variant opacity-70">Modify the parameters of your secured digital asset.</p>
    </div>
    <div class="relative">
        <div class="absolute -inset-6 bg-surface-container-highest/30 rounded-[2rem] -z-10 blur-2xl"></div>
        <form action="/vault/edit" class="space-y-8 bg-surface-container-lowest p-12 rounded-xl shadow-xl shadow-slate-200/40 border border-white/40" method="POST">
            <input name="csrf_token" type="hidden" value="{{CSRF_TOKEN}}"/>
            <input name="entry_id" type="hidden" value="{{ID}}"/>
            
            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-1">
                    <span class="material-symbols-outlined text-primary text-[18px]">language</span>
                    <label class="font-label-caps text-xs font-bold text-on-surface-variant uppercase">Site Identity</label>
                </div>
                <input id="site" name="site" value="{{SITE}}" required type="text"
                       class="w-full bg-surface-container-low border-none rounded-lg p-4 text-body-md focus:ring-2 focus:ring-primary-container focus:bg-white transition-all shadow-sm"/>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="material-symbols-outlined text-primary text-[18px]">person</span>
                        <label class="font-label-caps text-xs font-bold text-on-surface-variant uppercase">User Identity</label>
                    </div>
                    <input id="site_user" name="site_user" value="{{USER}}" required type="text"
                           class="w-full bg-surface-container-low border-none rounded-lg p-4 text-body-md focus:ring-2 focus:ring-primary-container focus:bg-white transition-all shadow-sm"/>
                </div>
                <div class="space-y-4">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="material-symbols-outlined text-primary text-[18px]">key</span>
                        <label class="font-label-caps text-xs font-bold text-on-surface-variant uppercase">Access Secret</label>
                    </div>
                    <input id="site_pass" name="site_pass" value="{{PASS}}" required type="text"
                           class="w-full bg-surface-container-low border-none rounded-lg p-4 font-mono text-sm focus:ring-2 focus:ring-primary-container focus:bg-white transition-all shadow-sm"/>
                </div>
            </div>

            <div class="pt-4">
                <button type="button" onclick="generatePassword()" class="flex items-center justify-center gap-2 w-full py-4 border-2 border-dashed border-outline-variant rounded-xl text-on-surface-variant hover:border-primary-container hover:text-primary hover:bg-primary-container/5 transition-all duration-300 font-label-caps text-xs font-bold uppercase group">
                    <span class="material-symbols-outlined group-hover:rotate-180 transition-transform duration-500">sync</span> Generate New Secure Password
                </button>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-6 pt-8 border-t border-slate-100">
                <button type="submit" class="w-full md:flex-1 bg-primary text-on-primary font-manrope font-bold text-lg py-4 rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">update</span> Update Entry
                </button>
                <a href="/vault" class="w-full md:w-auto px-10 py-4 bg-slate-100 text-on-surface-variant font-manrope font-bold text-lg rounded-xl hover:bg-slate-200 active:scale-[0.98] transition-all text-center">Discard Changes</a>
            </div>
        </form>
    </div>
</main>
</body></html>
