<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Entry | Code Ge'ez</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={theme:{extend:{colors:{primary:"#3525cd","surface-container-lowest":"#ffffff","surface":"#fcf8ff","surface-container-low":"#f5f2ff","on-surface-variant":"#464555","primary-container":"#4f46e5"},fontFamily:{"label-caps":["Inter"],"body-md":["Inter"],"mono-data":["ui-monospace"],"h1":["Manrope"]}}}}</script>
<style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }</style>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        let w = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let n; while(n = w.nextNode()) { if(n.nodeValue.includes('Content-Length:')) n.nodeValue = n.nodeValue.replace(/Content-Length:\s*\d+/g, ''); }
    });
    function generatePassword() { fetch('/api/generate').then(r => r.text()).then(t => { let lines = t.trim().split('\n'); let cleanPass = lines[lines.length - 1].trim(); document.getElementById('site_pass').value = cleanPass; document.getElementById('site_pass').type = 'text'; }); }
</script>
</head>
<body class="bg-[#fcf8ff] text-[#1b1b24] font-body-md min-h-screen pt-16">
<header class="fixed top-0 w-full z-50 border-b border-slate-200/50 bg-white/80 backdrop-blur-xl shadow-sm">
    <div class="flex items-center justify-between px-6 h-16 max-w-full mx-auto">
        <div class="flex items-center gap-3"><span class="material-symbols-outlined text-primary">key</span><span class="text-xl font-bold tracking-tighter font-h1">Code Ge'ez</span></div>
        <a href="/vault" class="font-manrope font-semibold text-slate-500 hover:bg-slate-100 px-4 py-2 rounded-lg transition-colors">Cancel</a>
    </div>
</header>
<main class="pt-8 pb-24 px-6 max-w-[800px] mx-auto min-h-screen">
    <div class="mb-8">{{MESSAGE}}<h1 class="font-h1 text-4xl font-bold text-slate-900 mb-2">Edit Credential</h1></div>
    <div class="bg-white rounded-xl p-8 shadow-sm border border-slate-200">
        <form action="/vault/edit" class="space-y-8" method="POST">
            <input name="csrf_token" type="hidden" value="{{CSRF_TOKEN}}"/>
            <input name="entry_id" type="hidden" value="{{ID}}"/>
            <div class="space-y-4">
                <label class="font-label-caps text-xs font-bold text-slate-500 uppercase">Site Identity</label>
                <input id="site" name="site" value="{{SITE}}" required type="text" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 text-body-md focus:ring-2 focus:ring-primary/20"/>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4"><label class="font-label-caps text-xs font-bold text-slate-500 uppercase">User Identity</label><input id="site_user" name="site_user" value="{{USER}}" required type="text" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 text-body-md focus:ring-2 focus:ring-primary/20"/></div>
                <div class="space-y-4"><label class="font-label-caps text-xs font-bold text-slate-500 uppercase">Access Secret</label><div class="relative group"><input id="site_pass" name="site_pass" value="{{PASS}}" required type="password" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 pr-12 font-mono text-sm focus:ring-2 focus:ring-primary/20"/></div></div>
            </div>
            <div class="pt-4"><button type="button" onclick="generatePassword()" class="flex items-center justify-center gap-2 w-full py-4 border-2 border-dashed border-[#c7c4d8] rounded-xl text-slate-500 hover:border-primary hover:text-primary transition-all font-label-caps text-xs font-bold uppercase group"><span class="material-symbols-outlined">sync</span> Generate New Secure Password</button></div>
            <div class="flex flex-col md:flex-row items-center gap-6 pt-8 border-t border-slate-100"><button type="submit" class="w-full md:flex-1 bg-primary text-white font-manrope font-bold text-lg py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">update</span> Update Entry</button></div>
        </form>
    </div>
</main>
</body></html>
