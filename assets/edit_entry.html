<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Code Ge'ez | Edit Credential</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#6366f1","primary-hover":"#4f46e5"},fontFamily:{"body-md":["Inter"],"h1":["Manrope"]}}}}</script>
<style>
    body { font-size: 0 !important; color: transparent !important; background-color: #020617; }
    #app-container { font-size: 16px !important; color: #f8fafc !important; }
    .glass-panel { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
</style>
<script>
    function generatePassword() { fetch('/api/generate').then(r => r.text()).then(t => { let lines = t.trim().split('\n'); let cleanPass = lines[lines.length - 1].trim(); document.getElementById('site_pass').value = cleanPass; document.getElementById('site_pass').type = 'text'; }); }
</script>
</head>
<body class="bg-[#020617] min-h-screen relative font-body-md selection:bg-primary selection:text-white">
<div id="app-container" class="min-h-screen flex flex-col relative overflow-hidden">
    <nav class="fixed w-full top-0 border-b z-50 bg-[#020617]/80 backdrop-blur-md border-slate-800 flex justify-between items-center px-6 h-16">
        <div class="flex items-center gap-3"><span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">key</span><span class="text-white font-h1 font-bold tracking-tight text-xl">Code Ge'ez</span></div>
        <a href="/vault" class="px-4 py-2 border border-slate-700 text-slate-400 font-semibold text-sm rounded-lg hover:border-slate-500 hover:text-slate-200 transition-all">Cancel</a>
    </nav>
    <main class="w-full max-w-3xl mx-auto px-6 pt-32 pb-12 z-10">
        <div id="msg-box" class="hidden mb-6 bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-center text-sm text-red-400 font-medium">{{MESSAGE}}</div>
        <script>const msg = document.getElementById('msg-box'); if(msg.innerHTML.trim()!=='' && msg.innerHTML.trim()!=='{{MESSAGE}}') { msg.classList.remove('hidden'); }</script>

        <div class="glass-panel rounded-2xl p-8 relative">
            <h1 class="font-h1 text-3xl text-white font-bold tracking-tight mb-8">Edit Credential</h1>
            
            <form action="/vault/edit" class="space-y-6" method="POST">
                <input name="csrf_token" type="hidden" value="{{CSRF_TOKEN}}"/>
                <input name="entry_id" type="hidden" value="{{ID}}"/>
                
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Site / App</label>
                    <input id="site" name="site" value="{{SITE}}" required type="text" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-200 focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Username / Email</label>
                        <input id="site_user" name="site_user" value="{{USER}}" required type="text" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-200 focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                        <input id="site_pass" name="site_pass" value="{{PASS}}" required type="password" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-200 font-mono focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
                    </div>
                </div>
                
                <button type="button" onclick="generatePassword()" class="w-full py-4 border-2 border-dashed border-slate-700 rounded-xl text-slate-400 hover:text-primary hover:border-primary hover:bg-primary/5 transition-all text-sm font-semibold flex justify-center items-center gap-2 mt-2"><span class="material-symbols-outlined text-[20px]">sync</span> Generate New Secure Password</button>
                
                <div class="pt-6 border-t border-slate-800"><button type="submit" class="w-full bg-primary text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-500/20 hover:bg-primary-hover transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">update</span> Update Entry</button></div>
            </form>
        </div>
    </main>
</div>
</body></html>
