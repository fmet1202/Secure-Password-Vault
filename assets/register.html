<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | Code Ge'ez</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = { theme: { extend: { colors: { primary: "#3525cd", "surface-container-lowest": "#ffffff", "surface": "#fcf8ff", "on-surface": "#1b1b24", "outline-variant": "#c7c4d8", "on-surface-variant": "#464555", "surface-container": "#f0ecf9" }, fontFamily: { "label-caps":["Inter"], "body-md":["Inter"], "h1":["Manrope"] } } } }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; vertical-align: middle;}
    .vault-card { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); }
</style>
<script>
    function checkStrengthAndMatch() {
        const pw = document.getElementById('reg_password').value;
        const confirm = document.getElementById('confirm_password').value;
        const confirmInput = document.getElementById('confirm_password');

        if (pw !== confirm && confirm.length > 0) {
            confirmInput.setCustomValidity("Passwords do not match");
        } else {
            confirmInput.setCustomValidity("");
        }

        let score = 0;
        if (pw.length >= 8) score++; if (/[A-Z]/.test(pw)) score++; if (/[a-z]/.test(pw)) score++; if (/[0-9]/.test(pw)) score++; if (/[^A-Za-z0-9]/.test(pw)) score++;
        const bars = document.querySelectorAll('.str-bar');
        const text = document.getElementById('str-text');
        bars.forEach((bar, index) => {
            bar.className = 'str-bar h-1.5 flex-1 rounded-full transition-colors duration-300 ' + (index < score ? (score <= 2 ? 'bg-red-500' : score <= 4 ? 'bg-yellow-500' : 'bg-green-500') : 'bg-slate-200');
        });
        if (score === 0 && pw.length === 0) text.textContent = '';
        else if (score <= 2) text.textContent = 'Weak'; else if (score <= 4) text.textContent = 'Good'; else text.textContent = 'Strong';
    }
</script>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<main class="w-full max-w-[440px] flex flex-col gap-8">
    <div class="flex flex-col items-center text-center gap-2">
        <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-xl shadow-primary/20">
            <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">key</span>
        </div>
        <h1 class="font-h1 text-3xl font-bold tracking-tighter text-on-background">Code Ge'ez</h1>
        <p class="font-body-md text-on-surface-variant max-w-[300px]">Create your master identity and protect your digital assets.</p>
    </div>
    <div class="empty:hidden">{{MESSAGE}}</div>
    <div class="vault-card bg-surface-container-lowest rounded-xl p-8 border border-outline-variant/30">
        <form action="/register" class="flex flex-col gap-4" method="POST">
            <input name="csrf_token" type="hidden" value="{{CSRF_TOKEN}}"/>

            <div class="flex flex-col gap-1">
                <label class="font-label-caps text-xs font-semibold text-on-surface-variant uppercase">Username</label>
                <div class="relative group"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary">person</span><input class="w-full pl-12 pr-4 py-3 bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20" name="username" required type="text"/></div>
            </div>

            <div class="flex flex-col gap-1">
                <label class="font-label-caps text-xs font-semibold text-on-surface-variant uppercase">Master Password</label>
                <div class="relative group"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary">key</span><input oninput="checkStrengthAndMatch()" class="w-full pl-12 pr-4 py-3 bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20" id="reg_password" name="password" required minlength="8" type="password"/></div>
            </div>

            <div class="flex flex-col gap-1 mt-1">
                <label class="font-label-caps text-xs font-semibold text-on-surface-variant uppercase">Confirm Password</label>
                <div class="relative group"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary">verified_user</span><input oninput="checkStrengthAndMatch()" class="w-full pl-12 pr-4 py-3 bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20" id="confirm_password" name="confirm_password" required minlength="8" type="password"/></div>
            </div>

            <div class="flex flex-col gap-1 mt-2">
                <div class="flex gap-1"><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-200"></div><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-200"></div><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-200"></div><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-200"></div><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-200"></div></div>
                <div class="flex justify-between text-[10px] text-on-surface-variant uppercase font-semibold mt-1"><span>Strength: <span id="str-text" class="text-primary"></span></span><span>8+ chars, A-a, 0-9, !@#</span></div>
            </div>

            <button class="mt-2 w-full py-4 bg-primary text-white font-h1 font-bold rounded-lg shadow-lg hover:bg-indigo-700 transition-all text-[15px]" type="submit">Register Account</button>
        </form>
        <div class="mt-8 pt-6 border-t border-slate-100 text-center"><a class="text-on-surface-variant hover:text-primary font-label-caps text-xs font-semibold uppercase" href="/login">Back to Login</a></div>
    </div>
</main>
</body></html>
