<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | SecureVault</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container": "#f0ecf9", "on-surface-variant": "#464555",
                    "surface-container-highest": "#e4e1ee", "surface-bright": "#fcf8ff",
                    "background": "#fcf8ff", "surface-container-high": "#eae6f4",
                    "primary-container": "#4f46e5", "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a", "on-error": "#ffffff", "on-background": "#1b1b24",
                    "primary": "#3525cd", "on-primary": "#ffffff", "surface": "#fcf8ff",
                    "outline-variant": "#c7c4d8", "outline": "#777587"
                },
                "fontFamily": {
                    "label-caps": ["Inter"], "body-md":["Inter"],
                    "h3": ["Manrope"], "h1": ["Manrope"], "h2": ["Manrope"]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; vertical-align: middle;}
    .vault-card { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); }
</style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<main class="w-full max-w-[440px] flex flex-col gap-8">
    <div class="flex flex-col items-center text-center gap-2">
        <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-xl shadow-primary/20">
            <span class="material-symbols-outlined text-on-primary text-2xl" style="font-variation-settings: 'FILL' 1;">lock</span>
        </div>
        <h1 class="font-h1 text-3xl font-bold tracking-tighter text-on-background">SecureVault</h1>
        <p class="font-body-md text-on-surface-variant max-w-[300px]">Create your master identity and protect your digital assets.</p>
    </div>
    <div class="empty:hidden">
        {{MESSAGE}}
    </div>
    <div class="vault-card bg-surface-container-lowest rounded-xl p-8 border border-surface-variant/30">
        <form action="/register" class="flex flex-col gap-4" method="POST">
            <input name="csrf_token" type="hidden" value="{{CSRF_TOKEN}}"/>
            <div class="flex flex-col gap-1">
                <label class="font-label-caps text-xs font-semibold text-on-surface-variant uppercase" for="username">Username</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary">person</span>
                    <input class="w-full pl-12 pr-4 py-3 bg-surface-container border-none rounded-lg font-body-md text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="username" name="username" placeholder="Choose a unique identifier" required type="text"/>
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-label-caps text-xs font-semibold text-on-surface-variant uppercase" for="password">Master Password</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary">key</span>
                    <input class="w-full pl-12 pr-4 py-3 bg-surface-container border-none rounded-lg font-body-md text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="password" name="password" placeholder="Min. 8 characters required" required minlength="8" type="password"/>
                </div>
            </div>
            <div class="mt-1 p-3 bg-surface-container-high/50 rounded-lg flex items-start gap-2 border border-outline-variant/20">
                <span class="material-symbols-outlined text-primary text-sm mt-0.5">info</span>
                <p class="text-[11px] leading-relaxed text-on-surface-variant">Your Master Password is the sole key to your vault. SecureVault cannot recover it if lost.</p>
            </div>
            <button class="mt-2 w-full py-4 bg-primary text-on-primary font-manrope font-bold rounded-lg shadow-lg shadow-primary/25 hover:bg-indigo-700 active:scale-[0.98] transition-all duration-200 text-[15px]" type="submit">
                Register Account
            </button>
        </form>
        <div class="mt-8 pt-6 border-t border-surface-variant/50 text-center">
            <a class="text-on-surface-variant hover:text-primary font-label-caps text-xs font-semibold uppercase transition-colors inline-flex items-center gap-1 group" href="/login">
                Back to Login
                <span class="material-symbols-outlined text-[14px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </a>
        </div>
    </div>
</main>
</body></html>
