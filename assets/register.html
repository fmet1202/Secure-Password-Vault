<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Code Ge'ez | Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#6366f1","primary-hover":"#4f46e5"},fontFamily:{"body-md":["Inter"],"h1":["Manrope"]}}}}</script>
<style>
    body { font-size: 0 !important; color: transparent !important; background-color: #020617; }
    #app-container { font-size: 16px !important; color: #f8fafc !important; }
    .glass-panel { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
</style>
<script>
    function checkStrengthAndMatch() {
        const pw = document.getElementById('reg_password').value; const confirm = document.getElementById('confirm_password').value; const confirmInput = document.getElementById('confirm_password');
        if (pw !== confirm && confirm.length > 0) confirmInput.setCustomValidity("Passwords do not match"); else confirmInput.setCustomValidity("");
        let score = 0; if (pw.length >= 8) score++; if (/[A-Z]/.test(pw)) score++; if (/[a-z]/.test(pw)) score++; if (/[0-9]/.test(pw)) score++; if (/[^A-Za-z0-9]/.test(pw)) score++;
        const bars = document.querySelectorAll('.str-bar'); const text = document.getElementById('str-text');
        bars.forEach((bar, index) => { bar.className = 'str-bar h-1.5 flex-1 rounded-full transition-colors duration-300 ' + (index < score ? (score <= 2 ? 'bg-red-500' : score <= 4 ? 'bg-amber-500' : 'bg-green-500') : 'bg-slate-700'); });
        if (score === 0 && pw.length === 0) text.textContent = ''; else if (score <= 2) text.textContent = 'Weak'; else if (score <= 4) text.textContent = 'Good'; else text.textContent = 'Strong';
    }
    function toggleRegPassword() {
        const input = document.getElementById('reg_password'); const icon = document.getElementById('toggle-icon');
        if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility_off'; } else { input.type = 'password'; icon.textContent = 'visibility'; }
    }
</script>
</head>
<body class="bg-[#020617] min-h-screen relative font-body-md selection:bg-primary selection:text-white">
<div id="app-container" class="min-h-screen flex flex-col relative overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-indigo-600/10 rounded-full blur-[100px] pointer-events-none"></div>
    <nav class="w-full p-6 flex items-center gap-3 relative z-50"><span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">key</span><span class="text-white font-h1 font-bold tracking-tight text-xl">Code Ge'ez</span></nav>
    <main class="flex-grow flex items-center justify-center w-full p-6 relative z-10">
        <div class="w-full max-w-[440px] glass-panel rounded-2xl p-8 relative">
            <header class="text-center mb-6 flex flex-col items-center">
                <div class="w-20 h-20 rounded-2xl bg-slate-800/50 border border-slate-700 flex items-center justify-center mb-4 shadow-lg"><span class="material-symbols-outlined text-primary text-[60px]" style="font-variation-settings: 'FILL' 1;">person_add</span></div>
                <h1 class="font-h1 text-2xl text-white font-bold tracking-tight">Create Vault</h1>
            </header>

            <!-- PERFECTED JS ERROR HANDLER -->
            <div id="msg-box" class="hidden mb-6 p-3 rounded-xl text-sm font-medium text-center flex items-center justify-center gap-2"></div>
            <script>
                const urlParams = new URLSearchParams(window.location.search);
                const error = urlParams.get('err'); const success = urlParams.get('msg');
                const msgBox = document.getElementById('msg-box');
                if (error) {
                    msgBox.innerHTML = `<span class="material-symbols-outlined">error</span> ${error.replace(/\+/g, ' ')}`;
                    msgBox.className = "mb-6 bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-xl text-sm font-medium text-center flex items-center justify-center gap-2";
                    msgBox.classList.remove('hidden');
                    window.history.replaceState({}, document.title, "/register");
                }
            </script>

            <form action="/register" class="space-y-4" method="POST">
                <input name="csrf_token" type="hidden" value="{{CSRF_TOKEN}}"/>
                <div class="space-y-1.5"><label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Username</label><div class="relative group"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">person</span><input class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-12 pr-4 text-slate-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" name="username" required type="text"/></div></div>
                <div class="space-y-1.5"><label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Master Password</label><div class="relative group"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">key</span><input oninput="checkStrengthAndMatch()" id="reg_password" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-12 pr-12 text-slate-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" name="password" required minlength="8" type="password"/><button type="button" onclick="toggleRegPassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors focus:outline-none"><span id="toggle-icon" class="material-symbols-outlined text-[20px]">visibility</span></button></div></div>
                <div class="space-y-1.5"><label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Confirm Password</label><div class="relative group"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">verified_user</span><input oninput="checkStrengthAndMatch()" id="confirm_password" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-12 pr-4 text-slate-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" name="confirm_password" required minlength="8" type="password"/></div></div>
                <div class="pt-1"><div class="flex gap-1 mb-1"><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-700"></div><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-700"></div><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-700"></div><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-700"></div><div class="str-bar h-1.5 flex-1 rounded-full bg-slate-700"></div></div><div class="flex justify-between text-[10px] font-semibold text-slate-500 uppercase tracking-wider"><span id="str-text" class="text-primary"></span><span>8+ chars, A-a, 0-9, !@#</span></div></div>
                <button class="w-full bg-primary text-white font-semibold py-4 rounded-xl hover:bg-primary-hover transition-colors shadow-lg shadow-indigo-500/20 mt-4" type="submit">Register Account</button>
            </form>
            <div class="mt-6 pt-6 border-t border-slate-800 text-center"><a class="text-sm text-slate-400 hover:text-primary font-semibold transition-colors" href="/login">Back to Login</a></div>
        </div>
    </main>
    <footer class="w-full py-6 text-center flex justify-center opacity-40 hover:opacity-100 transition-opacity z-50"><div class="flex flex-wrap justify-center items-center gap-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest"><span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[13px]">lock</span> AES-256 Encrypted</span><span class="hidden sm:inline text-slate-700">•</span><span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[13px]">security</span> Zero-Knowledge Arch</span><span class="hidden sm:inline text-slate-700">•</span><span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[13px]">vpn_key</span> Local Processing</span></div></footer>
</div>
</body></html>
