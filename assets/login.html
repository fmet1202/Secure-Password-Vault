<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Code Ge'ez | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={theme:{extend:{colors:{primary:"#3525cd","surface-container-lowest":"#ffffff","surface":"#fcf8ff", "on-surface-variant": "#464555", "surface-container": "#f0ecf9", "outline-variant": "#c7c4d8"},fontFamily:{"label-caps":["Inter"],"body-md":["Inter"],"h1":["Manrope"],"h2":["Manrope"]}}}}</script>
<style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }</style>
</head>
<body class="bg-surface font-body-md min-h-screen flex flex-col items-center justify-center p-6 relative">

<!-- TOP LEFT BRANDING -->
<nav class="absolute top-0 left-0 w-full p-6 flex items-center gap-2">
    <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">key</span>
    <span class="font-h1 text-xl font-bold tracking-tighter text-slate-900">Code Ge'ez</span>
</nav>

<main class="w-full max-w-[440px] flex flex-col gap-6 mt-8">
    <div class="flex flex-col items-center text-center gap-2 mb-2">
        
        <!-- BEAUTIFUL SECURE VAULT GRAPHIC -->
        <div class="relative w-28 h-28 flex items-center justify-center mb-2">
            <div class="absolute inset-0 bg-primary/10 rounded-full animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
            <div class="absolute inset-3 bg-primary/20 rounded-full animate-pulse"></div>
            <div class="relative z-10 w-16 h-16 bg-gradient-to-b from-slate-800 to-slate-900 rounded-2xl flex items-center justify-center shadow-xl border border-slate-700">
                <span class="material-symbols-outlined text-amber-400 text-3xl" style="font-variation-settings: 'FILL' 1;">enhanced_encryption</span>
            </div>
            <div class="absolute top-3 right-3 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center shadow-lg border-2 border-surface z-20">
                <span class="material-symbols-outlined text-white text-[10px]" style="font-variation-settings: 'wght' 700;">check</span>
            </div>
        </div>

        <h1 class="font-h1 text-3xl font-bold tracking-tighter text-slate-900">Secure Vault</h1>
        <p class="font-body-md text-slate-500">Access your encrypted credentials.</p>
    </div>

    <!-- BULLETPROOF ERROR MESSAGE BOX -->
    <div id="msg-box" class="hidden w-full bg-red-50 text-red-600 font-semibold p-3 rounded-lg text-sm text-center border border-red-100 shadow-sm">{{MESSAGE}}</div>
    <script>
        const msg = document.getElementById('msg-box');
        const content = msg.innerHTML.trim();
        if(content !== '' && content !== '{{MESSAGE}}') { msg.classList.remove('hidden'); }
    </script>

    <div class="bg-surface-container-lowest rounded-xl p-8 border border-outline-variant/30 shadow-[0_20px_50px_-12px_rgba(0,0,0,0.05)]">
        <form action="/login" class="flex flex-col gap-4" method="POST">
            <div class="flex flex-col gap-1">
                <label class="font-label-caps text-xs font-semibold text-slate-500 uppercase">Username</label>
                <div class="relative group"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary">person</span><input class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-primary/20" name="username" required type="text"/></div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-label-caps text-xs font-semibold text-slate-500 uppercase">Master Password</label>
                <div class="relative group"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary">key</span><input class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-primary/20" name="password" required type="password"/></div>
            </div>
            <button class="mt-2 w-full py-4 bg-slate-900 text-white font-h1 font-bold rounded-lg shadow-lg hover:bg-primary transition-all text-[15px]" type="submit">Access Vault</button>
        </form>
        <div class="mt-8 pt-6 border-t border-slate-100 text-center"><p class="text-sm text-slate-500">New to Code Ge'ez? <a class="text-primary font-bold hover:underline" href="/register">Register here.</a></p></div>
    </div>
</main>
</body></html>
