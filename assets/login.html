<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SecureVault | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container": "#f0ecf9", "on-surface-variant": "#464555",
                    "surface-container-highest": "#e4e1ee", "surface-bright": "#fcf8ff",
                    "background": "#fcf8ff", "surface-container-high": "#eae6f4",
                    "primary-container": "#4f46e5", "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a", "on-error": "#ffffff", "on-background": "#1b1b24",
                    "primary": "#3525cd", "on-primary": "#ffffff", "surface": "#fcf8ff",
                    "outline-variant": "#c7c4d8", "outline": "#777587"
                },
                "fontFamily": {
                    "label-caps": ["Inter"], "body-md": ["Inter"],
                    "h3": ["Manrope"], "h1": ["Manrope"], "h2": ["Manrope"]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
    .master-key-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
</style>
</head>
<body class="bg-slate-50 font-body-md text-on-background min-h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 border-b border-slate-200/50 bg-white/80 backdrop-blur-xl flex items-center justify-between px-6 h-16 max-w-full mx-auto">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-indigo-600" data-icon="lock">lock</span>
        <span class="text-xl font-bold tracking-tighter text-slate-900 font-h1">SecureVault</span>
    </div>
</header>
<main class="flex-grow flex items-center justify-center pt-16 px-6">
    <div class="w-full max-w-[440px] flex flex-col gap-8">
        <div class="empty:hidden" id="message-container">
            {{MESSAGE}}
        </div>
        <div class="bg-surface-container-lowest shadow-2xl shadow-slate-200/40 rounded-xl overflow-hidden p-8 border border-white">
            <div class="flex flex-col gap-1 mb-8 text-center">
                <h1 class="font-h2 text-3xl font-bold text-slate-900 tracking-tight">Identity Verification</h1>
                <p class="font-body-md text-on-surface-variant">Unlock your secure architectural vault</p>
            </div>
            <form action="/login" class="flex flex-col gap-4" method="POST">
                <div class="flex flex-col gap-1">
                    <label class="font-label-caps text-xs font-semibold text-on-surface-variant px-1 uppercase" for="username">Username</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">alternate_email</span>
                        <input class="w-full bg-slate-100 border-none rounded-lg py-3 pl-10 pr-4 focus:ring-0 focus:bg-white transition-all duration-300 font-body-md placeholder-slate-400 focus:shadow-[0_0_20px_rgba(79,70,229,0.1)]" id="username" name="username" placeholder="name@vault.com" required type="text"/>
                    </div>
                </div>
                <div class="flex flex-col gap-1 relative">
                    <div class="flex justify-between items-center px-1">
                        <label class="font-label-caps text-xs font-semibold text-on-surface-variant uppercase" for="password">Master Password</label>
                    </div>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">key</span>
                        <input class="w-full bg-slate-100 border-none rounded-lg py-3 pl-10 pr-4 focus:ring-0 focus:bg-white transition-all duration-300 font-body-md placeholder-slate-400 focus:shadow-[0_0_20px_rgba(79,70,229,0.1)]" id="password" name="password" placeholder="••••••••••••" required type="password"/>
                    </div>
                    <div class="mt-2 p-3 rounded-lg master-key-glass border border-white/40 flex items-center gap-3">
                        <div class="h-2 flex-grow bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-indigo-500 w-2/3"></div></div>
                        <span class="font-label-caps text-[10px] font-semibold text-on-surface-variant opacity-70">ENTROPY STRENGTH</span>
                    </div>
                </div>
                <button class="mt-2 bg-slate-900 hover:bg-primary text-white font-h3 font-bold text-[15px] py-4 rounded-lg shadow-lg shadow-slate-200 hover:shadow-indigo-200/50 transition-all duration-300 active:scale-95 flex items-center justify-center gap-2 group" type="submit">
                    <span>Access Vault</span>
                    <span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1">arrow_forward</span>
                </button>
            </form>
            <div class="mt-8 pt-4 border-t border-slate-100 text-center">
                <p class="font-body-md text-on-surface-variant">
                    New to SecureVault? <a class="text-indigo-600 font-semibold hover:text-indigo-800 transition-colors ml-1" href="/register">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</main>
</body></html>
