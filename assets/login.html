<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Code Ge'ez | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#6366f1","primary-hover":"#4f46e5",surface:"#0f172a","surface-card":"rgba(30, 41, 59, 0.7)"},fontFamily:{"body-md":["Inter"],"h1":["Manrope"]}}}}</script>
<style>
    /* THE C-HEADER LEAK FIX */
    body { font-size: 0 !important; color: transparent !important; background-color: #020617; }
    #app-container { font-size: 16px !important; color: #f8fafc !important; }
    .glass-panel { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
</style>
</head>
<body class="bg-[#020617] min-h-screen relative font-body-md selection:bg-primary selection:text-white">
<div id="app-container" class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
    <!-- Subtle Background Glow -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-indigo-600/10 rounded-full blur-[100px] pointer-events-none"></div>
    
    <main class="w-full max-w-md relative z-10">
        <div class="glass-panel rounded-2xl p-8 relative">
            <header class="text-center mb-8 flex flex-col items-center">
                <div class="w-16 h-16 rounded-2xl bg-slate-800/50 border border-slate-700 flex items-center justify-center mb-4 shadow-lg">
                    <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">key</span>
                </div>
                <h1 class="font-h1 text-3xl text-white font-bold tracking-tight">Code Ge'ez</h1>
                <p class="text-sm text-slate-400 mt-2">Access your secure credentials.</p>
            </header>

            <!-- Bulletproof Error Message -->
            <div id="msg-box" class="hidden mb-6 bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-xl text-sm font-medium text-center">{{MESSAGE}}</div>
            <script>
                const msg = document.getElementById('msg-box'); const content = msg.innerHTML.trim();
                if(content !== '' && content !== '{{MESSAGE}}') { msg.classList.remove('hidden'); }
            </script>

            <form action="/login" class="space-y-5" method="POST">
                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Username</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">person</span>
                        <input class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3.5 pl-12 pr-4 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" name="username" placeholder="Enter your username" required type="text"/>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Master Password</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">key</span>
                        <input class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3.5 pl-12 pr-4 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" name="password" placeholder="••••••••••••" required type="password"/>
                    </div>
                </div>

                <button class="w-full bg-primary text-white font-semibold py-4 rounded-xl hover:bg-primary-hover transition-colors shadow-lg shadow-indigo-500/20 mt-2" type="submit">
                    Access Vault
                </button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-slate-800 text-center">
                <p class="text-sm text-slate-400">New to Code Ge'ez? <a class="text-primary font-semibold hover:text-indigo-400 transition-colors" href="/register">Register here.</a></p>
            </div>
        </div>
    </main>
</div>
</body></html>
